<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Allsvenska Tipset – Modifierad tabell</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-950:#03160b; --green-900:#062713; --green-800:#0b3b1d; --green-500:#22c55e;
      --lime:#b7f36b; --gold:#ffd43b; --orange:#ff9f1c; --white:#f8fff8; --muted:#cfe7cf;
      --panel:rgba(2,24,11,.84); --line:rgba(255,255,255,.18);
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh; color: var(--white); padding: 10px;
      background: radial-gradient(circle at top left, rgba(183,243,107,.12), transparent 30rem),
                  linear-gradient(135deg, var(--green-950), var(--green-800));
    }
    #root {
      width:100%; max-width:850px; margin:0 auto; padding:14px;
      background:rgba(4,43,19,.78); border:1px solid rgba(255,255,255,.14);
      border-radius:16px; box-shadow:0 18px 60px rgba(0,0,0,.42);
    }
    .top-bar { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
    h1 { font-size:clamp(18px,2.3vw,26px); font-weight:900; letter-spacing:.03em; text-transform:uppercase; }
    .pill { font-size:12px; color:var(--muted); border:1px solid var(--line); border-radius:999px; padding:7px 10px; background:rgba(255,255,255,.08); }
    .main { display:grid; grid-template-columns:minmax(320px,1fr) 160px; gap:12px; align-items:start; }
    .panel { background:var(--panel); border:1px solid rgba(255,255,255,.14); border-radius:14px; padding:12px; }
    .panel h3 { font-size:13px; color:var(--lime); text-transform:uppercase; letter-spacing:.05em; margin-bottom:9px; }
    .hint, .progress-text { color:rgba(255,255,255,.72); font-size:12px; line-height:1.45; }
    .hint { margin-top:-4px; margin-bottom:8px; }
    .placement-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; height:34px; }
    .placement-num { width:24px; text-align:right; color:var(--muted); font-weight:900; font-variant-numeric:tabular-nums; font-size:13px; }
    .placement-slot { flex:1; height:34px; display:flex; align-items:center; min-width:0; padding:0 6px; border-radius:9px; border:2px dashed rgba(255,255,255,.28); background:rgba(0,0,0,.20); transition:background .12s,border-color .12s; }
    .placement-slot:hover, .placement-slot.drag-over, .unplaced-list.drag-over { border-color:var(--gold); background:rgba(255,212,59,.12); }
    .unplaced-list { display:flex; flex-direction:column; gap:5px; min-height:296px; border-radius:10px; padding:8px; border:2px dashed rgba(255,255,255,.18); background:rgba(0,0,0,.16); }
    .team-tag {
      background:rgba(255,255,255,.96); color:#123b1d; border-radius:8px; padding:6px 8px;
      font-size:12px; font-weight:900; cursor:grab; user-select:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      border:1px solid rgba(255,255,255,.7); box-shadow:0 2px 7px rgba(0,0,0,.18); touch-action:none;
    }
    .team-tag:hover { background:#fff; } .team-tag.dragging { opacity:.35; } .team-tag.selected { outline:3px solid var(--gold); background:#fff8d8; }
    .action-row { display:flex; gap:9px; flex-wrap:wrap; align-items:center; margin-top:12px; }
    button { border:none; border-radius:10px; padding:8px 12px; font-size:13px; font-weight:900; cursor:pointer; transition:transform .12s,filter .12s; }
    button:hover:not(:disabled) { transform:translateY(-1px); filter:brightness(1.05); } button:disabled { opacity:.45; cursor:not-allowed; }
    .primary { background:linear-gradient(135deg,#ffe066,#ffd43b); color:#173100; }
    .secondary { background:rgba(255,255,255,.12); color:white; border:1px solid rgba(255,255,255,.24); }
    .message { display:none; margin-top:10px; padding:10px 12px; border-radius:10px; font-weight:800; font-size:13px; background:rgba(255,178,178,.16); border:1px solid rgba(255,178,178,.35); color:#ffe1e1; }
    .result-box { margin-top:14px; background:var(--panel); border-radius:14px; padding:12px; border:1px solid rgba(255,255,255,.14); }
    .result-header { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:9px; }
    .result-header h3 { color:var(--lime); text-transform:uppercase; letter-spacing:.05em; font-size:13px; }
    textarea { width:100%; min-height:390px; resize:vertical; border-radius:10px; border:1px solid rgba(255,255,255,.24); background:rgba(0,0,0,.34); color:white; padding:12px; font:12px/1.55 ui-monospace,SFMono-Regular,Consolas,"Liberation Mono",monospace; outline:none; }
    .average-row { color:var(--orange); font-weight:900; }
    @media (max-width:760px) { .main { grid-template-columns:1fr; } #root { padding:12px; } }
  </style>
</head>
<body>
<div id="root">
  <div class="top-bar">
    <h1>⚽ Modifierad tabell</h1>
    <div class="pill">Simulera utfall mot tippade rader</div>
  </div>

  <div class="main">
    <div class="panel">
      <h3>Lägg in en modifierad tabell</h3>
      <p class="hint">Dra lagen till rätt plats, eller klicka på ett lag och därefter på önskad placering. Dubbelklicka på ett placerat lag för att flytta tillbaka det.</p>
      <div id="placements"></div>
      <div class="action-row">
        <button class="primary" id="okBtn" disabled>Simulera utfallet</button>
        <button class="secondary" id="resetBtn" type="button">Återställ</button>
      </div>
      <p class="progress-text" id="progressText">Placera alla 16 lag för att simulera utfallet.</p>
      <div class="message" id="messageBox"></div>
    </div>
    <div class="panel">
      <h3>Oplacerade lag</h3>
      <div id="unplaced" class="unplaced-list"></div>
    </div>
  </div>

  <div id="resultArea"></div>
</div>

  function buildPositionMap(indexOrder) {
    const map = {};
    indexOrder.forEach((teamIndex, position) => { map[teamIndex] = position + 1; });
    return map;
  }

  function calculateScore(actualIndexOrder, predictedIndexOrder) {
    const actualPositions = buildPositionMap(actualIndexOrder);
    const predictedPositions = buildPositionMap(predictedIndexOrder);
    let varianceSum = 0;
    let exactMatches = 0;
    for (const teamIndex of actualIndexOrder) {
      const diff = actualPositions[teamIndex] - predictedPositions[teamIndex];
      varianceSum += diff * diff;
      if (diff === 0) exactMatches++;
    }
    return { varianceSum, exactMatches };
  }

  function evaluatePredictedRows(actualIndexOrder) {
    return PREDICTED_ROWS.map(row => ({
      name: row.name,
      ...calculateScore(actualIndexOrder, row.tip)
    })).sort((a,b) =>
      a.varianceSum - b.varianceSum ||
      b.exactMatches - a.exactMatches ||
      a.name.localeCompare(b.name, 'sv')
    );
  }

  let placements = new Array(16).fill(null);
  let unplaced = [...TEAMS];
  let dragSource = null, dragSourceType = null, dragSourceIndex = null;
  let selectedTeam = null, selectedType = null, selectedIndex = null;

  const placementsEl = document.getElementById('placements');
  const unplacedEl = document.getElementById('unplaced');
  const okBtn = document.getElementById('okBtn');
  const resetBtn = document.getElementById('resetBtn');
  const resultArea = document.getElementById('resultArea');
  const progressText = document.getElementById('progressText');
  const messageBox = document.getElementById('messageBox');

  function showMessage(text) { messageBox.textContent = text; messageBox.style.display = 'block'; }
  function clearMessage() { messageBox.textContent = ''; messageBox.style.display = 'none'; }
  function clearSelection() { selectedTeam = null; selectedType = null; selectedIndex = null; }

  function render() {
    placementsEl.innerHTML = '';
    for (let i = 0; i < 16; i++) {
      const row = document.createElement('div');
      row.className = 'placement-row';
      const num = document.createElement('div');
      num.className = 'placement-num';
      num.textContent = i + 1;
      row.appendChild(num);
      const slot = document.createElement('div');
      slot.className = 'placement-slot';
      slot.dataset.index = i;
      if (placements[i]) slot.appendChild(makeTag(placements[i], 'placement', i));
      slot.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; slot.classList.add('drag-over'); });
      slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
      slot.addEventListener('drop', e => { e.preventDefault(); slot.classList.remove('drag-over'); dropOnSlot(i); });
      slot.addEventListener('click', () => placeSelectedOnSlot(i));
      row.appendChild(slot);
      placementsEl.appendChild(row);
    }

    unplacedEl.innerHTML = '';
    unplaced.forEach(team => unplacedEl.appendChild(makeTag(team, 'unplaced', null)));
    const placed = placements.filter(Boolean).length;
    okBtn.disabled = placed < 16;
    progressText.textContent = placed < 16
      ? `${placed} av 16 lag placerade.`
      : 'Alla lag placerade – simulera utfallet.';
  }

  function makeTag(name, type, idx) {
    const tag = document.createElement('div');
    tag.className = 'team-tag';
    tag.textContent = name;
    tag.draggable = true;
    tag.title = `${name}, ${MATCH_INDEX[name]}`;
    if (selectedTeam === name && selectedType === type && selectedIndex === idx) tag.classList.add('selected');
    tag.addEventListener('click', () => { selectedTeam = name; selectedType = type; selectedIndex = idx; clearMessage(); render(); });
    tag.addEventListener('dragstart', event => {
      event.dataTransfer.effectAllowed = 'move';
      event.dataTransfer.setData('text/plain', name);
      dragSource = name; dragSourceType = type; dragSourceIndex = idx;
      setTimeout(() => tag.classList.add('dragging'), 0);
    });
    tag.addEventListener('dragend', () => tag.classList.remove('dragging'));
    tag.addEventListener('dblclick', () => { if (type === 'placement') returnTeamToUnplaced(idx); });
    return tag;
  }

  function placeSelectedOnSlot(targetIdx) {
    if (!selectedTeam) return;
    dragSource = selectedTeam; dragSourceType = selectedType; dragSourceIndex = selectedIndex;
    dropOnSlot(targetIdx);
    clearSelection();
  }

  function returnTeamToUnplaced(srcIdx) {
    const team = placements[srcIdx];
    if (!team) return;
    placements[srcIdx] = null;
    if (!unplaced.includes(team)) unplaced.push(team);
    clearSelection(); clearMessage(); render();
  }

  function dropOnSlot(targetIdx) {
    clearMessage();
    if (!dragSource) return;
    if (dragSourceType === 'unplaced') {
      const displaced = placements[targetIdx];
      placements[targetIdx] = dragSource;
      unplaced = unplaced.filter(t => t !== dragSource);
      if (displaced) unplaced.push(displaced);
    } else if (dragSourceType === 'placement') {
      const srcIdx = parseInt(dragSourceIndex, 10);
      const displaced = placements[targetIdx];
      placements[targetIdx] = dragSource;
      placements[srcIdx] = displaced;
    }
    dragSource = null; clearSelection(); render();
  }

  unplacedEl.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; unplacedEl.classList.add('drag-over'); });
  unplacedEl.addEventListener('dragleave', () => unplacedEl.classList.remove('drag-over'));
  unplacedEl.addEventListener('drop', e => {
    e.preventDefault(); unplacedEl.classList.remove('drag-over');
    if (!dragSource || dragSourceType !== 'placement') return;
    const srcIdx = parseInt(dragSourceIndex, 10);
    placements[srcIdx] = null;
    if (!unplaced.includes(dragSource)) unplaced.push(dragSource);
    dragSource = null; clearSelection(); clearMessage(); render();
  });

  function createResultData() {
    const actualIndexOrder = placements.map(team => MATCH_INDEX[team]);
    const rankedRows = evaluatePredictedRows(actualIndexOrder);
    const maxExact = Math.max(...rankedRows.map(row => row.exactMatches));
    const averageVariance = rankedRows.reduce((sum,row) => sum + row.varianceSum, 0) / rankedRows.length;
    const averageExact = rankedRows.reduce((sum,row) => sum + row.exactMatches, 0) / rankedRows.length;
    return { actualIndexOrder, rankedRows, maxExact, averageVariance, averageExact };
  }

  function buildTextResult(data) {
    let text = `Modifierad tabell – simulerat utfall
`;
    text += `Sortering: lägst varians först. ★ = flest rätt placerade lag.

`;
    text += `#  Tippare          Varians  Rätt plats
`;
    text += `-- ---------------- -------  ----------
`;
    data.rankedRows.forEach((row, idx) => {
      const star = row.exactMatches === data.maxExact ? ' ★' : '';
      text += `${String(idx + 1).padStart(2,' ')} ${row.name.padEnd(16,' ')} ${String(row.varianceSum).padStart(7,' ')}  ${String(row.exactMatches).padStart(10,' ')}${star}
`;
    });
    text += `-- ---------------- -------  ----------
`;
    text += `   ${'MEDELVÄRDE'.padEnd(16,' ')} ${data.averageVariance.toFixed(1).padStart(7,' ')}  ${data.averageExact.toFixed(1).padStart(10,' ')}
`;
    return text;
  }

  function showTextResult(data) {
    resultArea.innerHTML = '';
    const box = document.createElement('div');
    box.className = 'result-box';
    box.innerHTML = `<div class="result-header"><h3>Endast resultat</h3></div>`;
    const ta = document.createElement('textarea');
    ta.readOnly = true;
    ta.value = buildTextResult(data);
    box.appendChild(ta);
    const row = document.createElement('div');
    row.className = 'action-row';
    const copyBtn = document.createElement('button');
    copyBtn.className = 'secondary';
    copyBtn.textContent = 'Kopiera resultat';
    copyBtn.addEventListener('click', () => {
      ta.select();
      navigator.clipboard?.writeText(ta.value).catch(() => document.execCommand('copy'));
      copyBtn.textContent = '✓ Kopierat';
      setTimeout(() => copyBtn.textContent = 'Kopiera resultat', 1600);
    });
    row.appendChild(copyBtn);
    box.appendChild(row);
    resultArea.appendChild(box);
    box.scrollIntoView({ behavior:'smooth', block:'start' });
  }

  okBtn.addEventListener('click', () => {
    if (placements.filter(Boolean).length < 16) { showMessage('Placera alla 16 lag innan du simulerar utfallet.'); return; }
    clearMessage();
    showTextResult(createResultData());
  });

  resetBtn.addEventListener('click', () => {
    placements = new Array(16).fill(null);
    unplaced = [...TEAMS];
    resultArea.innerHTML = '';
    clearSelection(); clearMessage(); render();
  });

  render();
</script>
